name: CI/CD — CRM OmniCloud

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '22.x'
  ACR_NAME: ${{ vars.ACR_NAME }}
  IMAGE_NAME: crm/app

jobs:
  # ── Build & Type Check ─────────────────────────────────────────────
  build:
    name: Build & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

  # ── Docker Build & Push ────────────────────────────────────────────
  docker:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push'
    outputs:
      image: ${{ steps.image.outputs.ref }}
    steps:
      - uses: actions/checkout@v4

      - name: ACR login
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_NAME }}.azurecr.io
          username: ${{ env.ACR_NAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Set image reference
        id: image
        run: echo "ref=${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ steps.image.outputs.ref }}
            ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:latest
          cache-from: type=registry,ref=${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:buildcache,mode=max

  # ── Deploy to Dev ──────────────────────────────────────────────────
  deploy-dev:
    name: Deploy → Dev
    runs-on: ubuntu-latest
    needs: docker
    if: github.ref == 'refs/heads/develop'
    environment: dev
    steps:
      - uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy Bicep infrastructure
        uses: azure/arm-deploy@v2
        with:
          resourceGroupName: rg-crm-dev
          template: ./infra/main.bicep
          parameters: >
            appName=crm-dev
            containerImage=${{ needs.docker.outputs.image }}
            databaseUrl=${{ secrets.DATABASE_URL }}
            directUrl=${{ secrets.DIRECT_URL }}
            nextauthSecret=${{ secrets.NEXTAUTH_SECRET }}
            nextauthUrl=https://crm-dev.azurecontainerapps.io
            twilioAccountSid=${{ secrets.TWILIO_ACCOUNT_SID }}
            twilioAuthToken=${{ secrets.TWILIO_AUTH_TOKEN }}
            twilioWebhookUrl=https://crm-dev.azurecontainerapps.io/api/webhooks/twilio/sms
            resendApiKey=${{ secrets.RESEND_API_KEY }}
            azureStorageAccountKey=${{ secrets.AZURE_STORAGE_ACCOUNT_KEY }}
            azureAdClientSecret=${{ secrets.AZURE_AD_CLIENT_SECRET }}
            emailWebhookSecret=${{ secrets.EMAIL_WEBHOOK_SECRET }}
          failOnStdErr: false

      - name: Verify deployment
        run: |
          az containerapp show \
            --name crm-dev \
            --resource-group rg-crm-dev \
            --query "properties.latestRevisionName" -o tsv

  # ── Deploy to Production ───────────────────────────────────────────
  deploy-prod:
    name: Deploy → Production
    runs-on: ubuntu-latest
    needs: docker
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Create resource group if needed
        run: |
          az group create \
            --name rg-crm-prod \
            --location canadacentral \
            --tags product=crm-omnicloud env=prod || true

      - name: Deploy Bicep infrastructure
        uses: azure/arm-deploy@v2
        with:
          resourceGroupName: rg-crm-prod
          template: ./infra/main.bicep
          parameters: >
            appName=crm-prod
            containerImage=${{ needs.docker.outputs.image }}
            databaseUrl=${{ secrets.DATABASE_URL }}
            directUrl=${{ secrets.DIRECT_URL }}
            nextauthSecret=${{ secrets.NEXTAUTH_SECRET }}
            nextauthUrl=https://crm-prod.azurecontainerapps.io
            twilioAccountSid=${{ secrets.TWILIO_ACCOUNT_SID }}
            twilioAuthToken=${{ secrets.TWILIO_AUTH_TOKEN }}
            twilioWebhookUrl=https://crm-prod.azurecontainerapps.io/api/webhooks/twilio/sms
            resendApiKey=${{ secrets.RESEND_API_KEY }}
            azureStorageAccountKey=${{ secrets.AZURE_STORAGE_ACCOUNT_KEY }}
            azureAdClientSecret=${{ secrets.AZURE_AD_CLIENT_SECRET }}
            emailWebhookSecret=${{ secrets.EMAIL_WEBHOOK_SECRET }}
          failOnStdErr: false

      - name: Verify deployment
        run: |
          az containerapp show \
            --name crm-prod \
            --resource-group rg-crm-prod \
            --query "properties.latestRevisionName" -o tsv

      - name: Output app URL
        run: |
          URL=$(az containerapp show \
            --name crm-prod \
            --resource-group rg-crm-prod \
            --query "properties.configuration.ingress.fqdn" -o tsv)
          echo "App deployed at: https://$URL"
